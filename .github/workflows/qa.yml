name: QA
# Mirrors `just qa`: catalogs are in sync, audit checks pass, SLP
# cross-references are bidirectional. Runs on every PR and on push to main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  qa:
    name: just qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run just qa
        run: just qa
