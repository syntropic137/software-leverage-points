name: Plugin version check
# Pattern adapted from syntropic137-claude-plugin, extended to cover all four
# vendor manifests this plugin ships. Fails the PR if:
#   1. Non-manifest content changed but no manifest version was bumped, or
#   2. The four manifests disagree on version.
# Claude Code's update detector keys off .claude-plugin/plugin.json's version,
# so a missed bump means installed copies stay stuck on the old version.

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Enforce version bump and manifest parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify manifest version parity (all declared files)
        run: bash scripts/bump-version.sh --check

      - name: Enforce version bump on content change
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          # Files declared in .version-bump.json are the manifest set we manage.
          declared=$(jq -r '.files[].path' .version-bump.json)
          # Build a grep -vE pattern from the declared paths.
          exclude_pattern=$(printf '%s\n' $declared | sed 's|/|\\/|g; s|\.|\\.|g' | paste -sd'|' -)
          changed=$(git diff --name-only "$base"...HEAD -- . | grep -vE "^(${exclude_pattern})$" || true)
          if [[ -z "$changed" ]]; then
            echo "OK: no non-manifest content changed; version bump not required"
            exit 0
          fi
          base_version=$(git show "$base:.claude-plugin/plugin.json" | jq -r '.version')
          head_version=$(jq -r '.version' .claude-plugin/plugin.json)
          if [[ "$base_version" == "$head_version" ]]; then
            echo "FAIL: content changed but .claude-plugin/plugin.json version is still $head_version"
            echo "Run 'just bump <new-version>' locally to bump all declared manifests."
            exit 1
          fi
          echo "OK: version bumped $base_version -> $head_version"
